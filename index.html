<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRTI 伴侣关系类型测试</title>
  <style>
    :root {
      --bg: #fdf6f1;
      --panel: #ffffff;
      --text: #2a1f1a;
      --muted: #8a6e65;
      --line: #e8d5cc;
      --soft: #f7ede8;
      --accent: #c07a5e;
      --accent-strong: #9e5c40;
      --accent-her: #7a6fc0;
      --accent-him: #5c7a9e;
      --shadow: 0 16px 40px rgba(120, 60, 30, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
      font-weight: 700;
      -webkit-font-smoothing: antialiased;
      background: radial-gradient(circle at top left, #fdf8f4 0, #fdf6f1 36%, #f9f0ea 100%);
      color: var(--text);
      min-height: 100vh;
    }

    button, .badge, .eyebrow, .progress-text, .hint, .intro-chip,
    .dim-item-score, .type-kicker, .index-item-name, .index-item-label,
    .index-bar-labels, .top3-sim {
      font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
      font-weight: 700;
    }

    .shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 56px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      margin-top: 20px;
      overflow: hidden;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -60px;
      top: -60px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(192, 122, 94, 0.14), rgba(192, 122, 94, 0.01));
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--accent-strong);
      border: 1px solid var(--line);
      background: var(--soft);
      border-radius: 999px;
      padding: 8px 12px;
      margin-bottom: 16px;
    }

    h1, h2, h3, p { margin: 0; }

    .hero h1 {
      font-size: clamp(26px, 5vw, 48px);
      line-height: 1.1;
      letter-spacing: -0.03em;
      max-width: 680px;
    }

    .hero .sub {
      margin-top: 14px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.75;
      max-width: 680px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    .hero-minimal {
      min-height: 52vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 42px 20px;
    }

    .hero-minimal::after { display: none; }
    .hero-minimal h1 { max-width: none; }
    .hero-actions-single { justify-content: center; margin-top: 28px; }

    .intro-meta {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .intro-chip {
      font-size: 13px;
      color: var(--muted);
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 12px;
    }

    button {
      border: 0;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, opacity .16s ease;
      font: inherit;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { cursor: not-allowed; opacity: 0.55; transform: none; }

    .btn-primary {
      background: var(--accent-strong);
      color: #fff;
      padding: 14px 24px;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(158, 92, 64, 0.2);
      font-weight: 700;
    }

    .btn-secondary {
      background: #fff;
      color: var(--accent-strong);
      padding: 14px 20px;
      border-radius: 14px;
      border: 1px solid var(--line);
      font-weight: 700;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .test-wrap, .result-wrap {
      margin-top: 22px;
      padding: 22px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .progress {
      flex: 1;
      min-width: 240px;
      height: 10px;
      background: #f0e4dd;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress > span {
      display: block;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #d4957a, #9e5c40);
      border-radius: inherit;
      transition: width .22s ease;
    }

    .progress-text {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .question-list { display: grid; gap: 16px; }

    .question {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(180deg, #ffffff, #fdf9f7);
    }

    .question-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      background: var(--soft);
      border: 1px solid var(--line);
      font-size: 12px;
    }

    .question-title {
      font-size: 16px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .options { display: grid; gap: 10px; margin-top: 14px; }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      cursor: pointer;
      transition: border-color .16s ease, background .16s ease;
    }

    .option:hover { border-color: #d4b0a0; background: #fdf5f2; }

    .option input {
      margin-top: 3px;
      accent-color: var(--accent-strong);
      transform: scale(1.1);
      flex-shrink: 0;
    }

    .option-code {
      font-weight: 800;
      color: var(--accent-strong);
      min-width: 22px;
      flex-shrink: 0;
    }

    .actions-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
      padding-top: 6px;
    }

    .hint { color: var(--muted); font-size: 13px; line-height: 1.7; }

    /* Result page */
    .result-layout { display: grid; gap: 18px; }

    .result-top {
      display: grid;
      grid-template-columns: 0.85fr 1.15fr;
      gap: 18px;
      align-items: stretch;
    }

    .poster-box, .type-box, .index-box, .dim-box, .top3-box, .note-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(180deg, #ffffff, #fdf9f7);
    }

    .poster-box {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      background: radial-gradient(circle at top right, rgba(192,122,94,0.14), rgba(192,122,94,0) 40%),
                  linear-gradient(180deg, #ffffff, #fdf6f1);
    }

    .poster-box::after {
      content: "";
      position: absolute;
      right: -46px;
      bottom: -46px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(192,122,94,0.1), rgba(192,122,94,0.01));
      pointer-events: none;
    }

    .poster-image {
      width: 100%;
      height: auto;
      object-fit: contain;
      border-radius: 14px;
      display: block;
      position: relative;
      z-index: 1;
    }

    .poster-box.no-image .poster-image { display: none; }

    .poster-box.no-image {
      justify-content: center;
      align-items: center;
    }

    .poster-type-code {
      font-size: clamp(36px, 7vw, 72px);
      font-weight: 900;
      letter-spacing: -0.04em;
      color: var(--accent-strong);
      opacity: 0.18;
      line-height: 1;
      position: relative;
      z-index: 1;
    }

    .poster-caption {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
      position: relative;
      z-index: 1;
      font-style: italic;
    }

    .type-kicker {
      font-size: 14px;
      color: var(--accent-strong);
      margin-bottom: 8px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .type-name {
      font-size: clamp(28px, 4.5vw, 44px);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .type-en {
      margin-top: 6px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .14em;
      color: var(--muted);
    }

    .type-subname {
      margin-top: 10px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.8;
    }

    .type-intro {
      margin-top: 16px;
      font-size: 15px;
      line-height: 1.8;
      color: var(--muted);
      font-style: italic;
    }

    .match {
      margin-top: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--soft);
      border: 1px solid var(--line);
      color: var(--accent-strong);
      font-weight: 700;
      font-size: 14px;
    }

    .type-desc {
      margin: 0;
      line-height: 1.9;
      font-size: 15px;
      color: #2e1c15;
      white-space: pre-line;
    }

    .desc-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px 26px;
      background: linear-gradient(180deg, #ffffff, #fdf9f7);
    }

    /* Index bars */
    .index-box h3, .dim-box h3, .top3-box h3, .note-box h3 {
      font-size: 16px;
      margin-bottom: 14px;
    }

    .index-list { display: grid; gap: 28px; }

    .index-item { }

    .index-item-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 16px;
    }

    .index-item-name {
      font-size: 14px;
      font-weight: 700;
    }

    .index-item-label {
      font-size: 12px;
      color: var(--muted);
    }

    .index-bar-wrap {
      position: relative;
      height: 46px;
      overflow: visible;
      margin-top: 20px;
    }

    .index-bar-track {
      position: absolute;
      top: 14px;
      left: 0;
      right: 0;
      height: 10px;
      background: #f0e4dd;
      border-radius: 999px;
      overflow: visible;
    }

    .index-bar-fill {
      position: absolute;
      top: 0;
      height: 100%;
      border-radius: 999px;
      transition: all .4s ease;
    }

    .index-bar-fill.her-side {
      right: 50%;
      background: linear-gradient(270deg, #b8a8e8, #7a6fc0);
      border-radius: 999px 0 0 999px;
    }

    .index-bar-fill.him-side {
      left: 50%;
      background: linear-gradient(90deg, #a8c0e0, #5c7a9e);
      border-radius: 0 999px 999px 0;
    }

    .index-bar-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 3px;
      height: 16px;
      background: var(--line);
      border-radius: 2px;
      z-index: 2;
    }

    .index-bar-dot {
      position: absolute;
      top: 50%;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid var(--accent-strong);
      transform: translate(-50%, -50%);
      z-index: 3;
      transition: left .4s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    .index-bar-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 26px;
      font-size: 11px;
      color: var(--muted);
    }

    /* Dim list */
    .dim-list { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .dim-group {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fff;
      display: grid;
      gap: 12px;
    }

    .dim-group-header {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent-strong);
      letter-spacing: .06em;
      text-transform: uppercase;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
    }

    .dim-item {
      border-top: 1px solid var(--soft);
      padding-top: 10px;
    }

    .dim-item:first-of-type { border-top: none; padding-top: 0; }

    .dim-item-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .dim-item-name { font-size: 14px; font-weight: 700; }

    .dim-item-score {
      color: var(--accent-strong);
      font-weight: 800;
      font-size: 14px;
      white-space: nowrap;
    }

    .dim-item p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.8; }

    @media (max-width: 700px) { .dim-list { grid-template-columns: 1fr; } }

    /* Top 3 */
    .top3-list { display: grid; gap: 10px; }

    .top3-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      background: #fff;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .top3-item strong { display: block; margin-bottom: 2px; font-size: 15px; }
    .top3-item span { color: var(--muted); font-size: 13px; }
    .top3-sim { color: var(--accent-strong); font-weight: 800; font-size: 16px; white-space: nowrap; }

    .note-box p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.8; }

    .result-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    @media (max-width: 860px) {
      .result-top { grid-template-columns: 1fr; }
    }

    @media (max-width: 600px) {
      .shell { padding: 14px 12px 42px; }
      .hero, .test-wrap, .result-wrap { padding: 16px; }
      .hero h1 { font-size: 28px; }
      .question-title { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="shell">

    <!-- Screen 1: Intro -->
    <section id="intro" class="screen active">
      <div class="hero card hero-minimal">
        <div class="eyebrow">CRTI · 伴侣关系类型测试</div>
        <h1>你们是哪一种？</h1>
        <div class="sub" style="margin-top:8px;font-size:12px;color:var(--muted);letter-spacing:0.02em;">Couple Relationship Type Indicator</div>
        <div class="sub">16 种伴侣关系类型，单人作答，两个人可以各测一份再对照。<br>用"我们"的视角回答，大约 8 分钟。</div>
        <div class="hero-actions hero-actions-single">
          <button id="startBtn" class="btn-primary">开始测试</button>
        </div>
        <div class="intro-meta">
          <span class="intro-chip">32 道题</span>
          <span class="intro-chip">8 个维度</span>
          <span class="intro-chip">三项关系指数</span>
          <span class="intro-chip">无需注册，纯前端计算</span>
        </div>
        <div style="margin-top:18px;font-size:12px;color:var(--muted);font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;">
          by X的Linote 🎃 &nbsp;@Alexjkman
        </div>
      </div>
    </section>

    <!-- Screen 2: Test -->
    <section id="test" class="screen">
      <div class="test-wrap card">
        <div class="topbar">
          <div class="progress"><span id="progressBar"></span></div>
          <div class="progress-text" id="progressText">0 / 32</div>
        </div>
        <div id="questionList" class="question-list"></div>
        <div class="actions-bottom">
          <div class="hint" id="testHint">32 道题全部作答才能提交，不许跳过。</div>
          <div style="display:flex;gap:12px;flex-wrap:wrap;">
            <button id="backIntroBtn" class="btn-secondary">返回首页</button>
            <button id="submitBtn" class="btn-primary" disabled>提交并查看结果</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Screen 3: Result -->
    <section id="result" class="screen">
      <div class="result-wrap card">
        <div class="result-layout">

          <div class="result-top">
            <div class="poster-box" id="posterBox">
              <img id="posterImage" class="poster-image" alt="关系类型图" />
            </div>

            <div class="type-box">
              <div class="type-kicker" id="resultTypeCode">你们的关系类型</div>
              <div class="type-name" id="resultTypeName">——</div>
              <div class="type-en" id="resultTypeEn"></div>
              <div class="type-subname" id="resultTypeSub"></div>
              <div class="match" id="matchBadge"></div>
              <div class="type-intro" id="resultIntro"></div>
            </div>
          </div>

          <div class="desc-box">
            <p class="type-desc" id="resultDesc"></p>
          </div>

          <div class="index-box">
            <h3>三项关系指数</h3>
            <div class="index-list" id="indexList"></div>
          </div>

          <div class="dim-box">
            <h3>八维度解读</h3>
            <div class="dim-list" id="dimList"></div>
          </div>

          <div class="top3-box">
            <h3>最相近的其他类型</h3>
            <div class="top3-list" id="top3List"></div>
          </div>

          <div class="note-box">
            <h3>友情提示</h3>
            <p id="noteText">本测试仅供娱乐与自我观察，不构成心理学诊断或关系咨询建议。两个人各自测一份再对照，往往比一个人测更有意思。</p>
          </div>

        </div>

        <div class="result-actions">
          <button id="restartBtn" class="btn-secondary">重新测试</button>
          <button id="toTopBtn" class="btn-primary">回到首页</button>
        </div>
      </div>
    </section>

  </div>

  <script>
    /* ─── Dimension meta ─── */
    const dimensionMeta = {
      d1: { name: '冲突模式',   axis: 1 },
      d2: { name: '情感投入度', axis: 1 },
      d3: { name: '摩擦频率',   axis: 1 },
      d4: { name: '分工清晰度', axis: 1 },
      d5: { name: '决策权归属', axis: 2 },
      d6: { name: '情绪掌控权', axis: 2 },
      d7: { name: '规则定义权', axis: 2 },
      d8: { name: '资源控制权', axis: 2 },
    };

    /* ─── Questions ─── */
    const questions = [
      {
        id: 'q1', dim: 'd1',
        text: '"春节去谁家过"这道每年必考题，你们是怎么解的？',
        options: [
          { label: '坐下来谈，定出了双方都说得过去的方案', value: 3 },
          { label: '有一方妥协了，但心里憋着', value: 2 },
          { label: '谁嗓门大听谁的，或者干脆不谈这个话题', value: 1 },
        ]
      },
      {
        id: 'q2', dim: 'd1',
        text: '上次你们认真吵架，是怎么收场的？',
        options: [
          { label: '说开了，有了结论，甚至比吵前更亲近了', value: 3 },
          { label: '一方先道歉翻篇，根本问题没解决', value: 2 },
          { label: '冷战自然结束，没说开，等着下次再爆', value: 1 },
        ]
      },
      // d2
      {
        id: 'q3', dim: 'd2',
        text: '对方发消息说"今天工作特别崩溃，被领导当众怼了"，你们接下来通常是？',
        options: [
          { label: '立刻追问细节，或者直接打电话来陪着说', value: 3 },
          { label: '回几句安慰的话，让对方早点休息', value: 2 },
          { label: '发个"加油"表情包，然后各自去做自己的事', value: 1 },
        ]
      },
      {
        id: 'q4', dim: 'd2',
        text: '上次你"不是逢节日、不是被催促、纯粹因为想"而特意为对方做了什么，是多久前的事？',
        options: [
          { label: '就在最近，这种事对我们来说很正常', value: 3 },
          { label: '有，但需要想一会儿，不是特别频繁了', value: 2 },
          { label: '想了很久……已经很久没这样过了', value: 1 },
        ]
      },
      // d3
      {
        id: 'q5', dim: 'd3',
        text: '"老公打游戏/刷手机不带孩子/不做家务"这类矛盾，在你们关系里有没有？',
        options: [
          { label: '有，而且是长年老话题，时不时就要爆发', value: 3 },
          { label: '偶尔有不满，但不是主要矛盾', value: 2 },
          { label: '基本没有，这件事在我们这里没什么争议', value: 1 },
        ]
      },
      {
        id: 'q6', dim: 'd3',

    /* ─── Axis vectors ─── */

    const AXIS1_TYPES = [

    const AXIS2_TYPES = [
      { code: 'HIM',  vec: [3, 2, 2, 3] },

    /* ─── App state ─── */
    const app = { answers: {}, shuffled: [] };

    /* ─── Helpers ─── */
    function showScreen(name) {
      Object.entries(screens).forEach(([k, el]) => el.classList.toggle('active', k === name));
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // 4 questions per dim → raw range 4–12
    function sumToLevel(score) {
      if (score <= 7)  return 'L';
      if (score <= 9)  return 'M';
      return 'H';
    }

    function levelNum(level) { return { L: 1, M: 2, H: 3 }[level]; }

    function euclidean(a, b) {
      return Math.sqrt(a.reduce((s, v, i) => s + (v - b[i]) ** 2, 0));
    }

    /* ─── Render questions ─── */
    function renderQuestions() {
      const list = document.getElementById('questionList');
      list.innerHTML = '';
      app.shuffled.forEach((q, idx) => {
        const card = document.createElement('article');
        card.className = 'question';
        card.innerHTML = `
          <div class="question-meta">
            <div class="badge">第 ${idx + 1} 题</div>
            <div style="color:var(--muted);font-size:12px;">维度已隐藏</div>
          </div>
          <div class="question-title">${q.text}</div>
          <div class="options">
            ${q.options.map((opt, i) => {
              const code = ['A', 'B', 'C'][i];
              const checked = app.answers[q.id] === opt.value ? 'checked' : '';
              return `<label class="option">
                <input type="radio" name="${q.id}" value="${opt.value}" ${checked} />
                <div class="option-code">${code}</div>
                <div>${opt.label}</div>
              </label>`;
            }).join('')}
          </div>
        `;
        list.appendChild(card);
      });

      list.querySelectorAll('input[type="radio"]').forEach(input => {
        input.addEventListener('change', e => {
          app.answers[e.target.name] = Number(e.target.value);
          updateProgress();
        });
      });

      updateProgress();
    }

    function updateProgress() {
      const total = app.shuffled.length;
      const done = app.shuffled.filter(q => app.answers[q.id] !== undefined).length;
      const pct = total ? (done / total) * 100 : 0;
      document.getElementById('progressBar').style.width = `${pct}%`;
      document.getElementById('progressText').textContent = `${done} / ${total}`;
      const complete = done === total && total > 0;
      document.getElementById('submitBtn').disabled = !complete;
      document.getElementById('testHint').textContent = complete
        ? '全部做完了，可以提交了。'
        : '32 道题全部作答才能提交，不许跳过。';
    }

    /* ─── Scoring ─── */
    function computeResult() {
      const rawScores = { d1: 0, d2: 0, d3: 0, d4: 0, d5: 0, d6: 0, d7: 0, d8: 0 };
      questions.forEach(q => { rawScores[q.dim] += Number(app.answers[q.id] || 0); });

      const levels = {};
      Object.keys(rawScores).forEach(dim => { levels[dim] = sumToLevel(rawScores[dim]); });

      const ax1vec = ['d1', 'd2', 'd3', 'd4'].map(d => levelNum(levels[d]));
      const ax2vec = ['d5', 'd6', 'd7', 'd8'].map(d => levelNum(levels[d]));

      let bestAx1 = AXIS1_TYPES[0], bestD1 = Infinity;
      AXIS1_TYPES.forEach(t => {
        const d = euclidean(ax1vec, t.vec);
        if (d < bestD1) { bestD1 = d; bestAx1 = t; }
      });

      let bestAx2 = AXIS2_TYPES[0], bestD2 = Infinity;
      AXIS2_TYPES.forEach(t => {
        const d = euclidean(ax2vec, t.vec);
        if (d < bestD2) { bestD2 = d; bestAx2 = t; }
      });

      const typeCode = bestAx1.code + '-' + bestAx2.code;
      const userVec8 = [...ax1vec, ...ax2vec];

      // Rank all 16 types
      const allTypes = [];
      AXIS1_TYPES.forEach(a1 => {
        AXIS2_TYPES.forEach(a2 => {
          const code = a1.code + '-' + a2.code;
          const vec = [...a1.vec, ...a2.vec];
          const dist = euclidean(userVec8, vec);
          const maxDist = Math.sqrt(8 * 4); // max possible
          const similarity = Math.max(0, Math.round((1 - dist / maxDist) * 100));
          allTypes.push({ code, dist, similarity });
        });
      });
      allTypes.sort((a, b) => a.dist !== b.dist ? a.dist - b.dist : b.similarity - a.similarity);

      // Index values 0=female(left) … 1=male(right)
      // Each dim now sums 4 questions → range 4–12
      const d3 = rawScores.d3, d4 = rawScores.d4;
      const d5 = rawScores.d5, d6 = rawScores.d6;
      const d7 = rawScores.d7, d8 = rawScores.d8;

      const decisionIndex  = (d5 + d7 - 8)  / 16;         // range 8–24 → 0–1, high=male
      const emotionIndex   = 1 - (d6 + d3 - 8) / 16;      // high d6=female emotional → invert
      const realityIndex   = (d8 - d4 + 8)  / 16;          // high d8 & low d4 → male side

      return {
        rawScores, levels, typeCode,
        decisionIndex:  Math.min(1, Math.max(0, decisionIndex)),
        emotionIndex:   Math.min(1, Math.max(0, emotionIndex)),
        realityIndex:   Math.min(1, Math.max(0, realityIndex)),
        allTypes,
        primarySimilarity: allTypes[0].similarity,
      };
    }

    /* ─── Render index bar ─── */
    function renderIndexBar(name, value, herLabel, himLabel) {
      const pct = value * 100;
      const deviation = Math.abs(value - 0.5) * 100;
      const side = value < 0.5 ? 'her-side' : 'him-side';
      const fillStyle = side === 'her-side'
        ? `right: 50%; width: ${deviation}%;`
        : `left: 50%; width: ${deviation}%;`;
      const label = value < 0.4 ? `偏${herLabel}` : value > 0.6 ? `偏${himLabel}` : '相对均衡';

      return `
        <div class="index-item">
          <div class="index-item-header">
            <div class="index-item-name">${name}</div>
            <div class="index-item-label">${label}</div>
          </div>
          <div class="index-bar-wrap">
            <div class="index-bar-track">
              <div class="index-bar-fill ${side}" style="${fillStyle}"></div>
              <div class="index-bar-center"></div>
              <div class="index-bar-dot" style="left: ${pct}%"></div>
            </div>
            <div class="index-bar-labels">
              <span>${herLabel}</span>
              <span>均衡</span>
              <span>${himLabel}</span>
            </div>
          </div>
        </div>
      `;
    }

    /* ─── Render result ─── */
    function renderResult() {
      const result = computeResult();
      const typeData = TYPE_LIBRARY[result.typeCode];

      // Type box
      document.getElementById('resultTypeCode').textContent = result.typeCode;
      document.getElementById('resultTypeName').textContent = typeData.cn;
      document.getElementById('resultTypeEn').textContent = typeData.en;
      document.getElementById('resultTypeSub').textContent = typeData.axes;
      document.getElementById('matchBadge').textContent = `匹配度 ${result.primarySimilarity}%`;
      document.getElementById('resultDesc').textContent = typeData.desc;

      // Poster
      const posterBox = document.getElementById('posterBox');
      const posterImage = document.getElementById('posterImage');
      const imgSrc = `./image/${result.typeCode}.png`;
      posterImage.src = imgSrc;
      posterImage.alt = typeData.cn;
      posterImage.onerror = () => { posterBox.classList.add('no-image'); };
      posterImage.onload = () => { posterBox.classList.remove('no-image'); };
      document.getElementById('resultIntro').textContent = typeData.intro;

      // Index bars
      document.getElementById('indexList').innerHTML =
        renderIndexBar('决策权指数',   result.decisionIndex, '女方偏高', '男方偏高') +
        renderIndexBar('情绪主导指数', result.emotionIndex,  '女方偏高', '男方偏高') +
        renderIndexBar('现实承担指数', result.realityIndex,  '女方偏高', '男方偏高');

      // Dimension list — 4 themed groups
      const DIM_GROUPS = [
        { label: '关系温度', dims: ['d1', 'd2'] },
        { label: '日常运转', dims: ['d3', 'd4'] },
        { label: '权力格局', dims: ['d5', 'd6'] },
        { label: '底层结构', dims: ['d7', 'd8'] },
      ];
      document.getElementById('dimList').innerHTML = DIM_GROUPS.map(group => {
        const items = group.dims.map(dim => {
          const level = result.levels[dim];
          const raw = result.rawScores[dim];
          return `
            <div class="dim-item">
              <div class="dim-item-top">
                <div class="dim-item-name">${dimensionMeta[dim].name}</div>
                <div class="dim-item-score">${level} · ${raw}分</div>
              </div>
              <p>${DIM_EXPLANATIONS[dim][level]}</p>
            </div>`;
        }).join('');
        return `<div class="dim-group"><div class="dim-group-header">${group.label}</div>${items}</div>`;
      }).join('');

      // Top 3 (excluding primary)
      const others = result.allTypes.filter(t => t.code !== result.typeCode).slice(0, 3);
      document.getElementById('top3List').innerHTML = others.map((t, i) => {
        const td = TYPE_LIBRARY[t.code];
        return `
          <div class="top3-item">
            <div>
              <strong>${t.code}（${td.cn}）</strong>
              <span>${td.axes}</span>
            </div>
            <div class="top3-sim">${t.similarity}%</div>
          </div>
        `;
      }).join('');

      showScreen('result');
    }

    /* ─── Event listeners ─── */
    function startTest() {
      app.answers = {};
      app.shuffled = shuffle(questions);
      renderQuestions();
      showScreen('test');
    }

    document.getElementById('startBtn').addEventListener('click', startTest);
    document.getElementById('backIntroBtn').addEventListener('click', () => showScreen('intro'));
    document.getElementById('submitBtn').addEventListener('click', renderResult);
    document.getElementById('restartBtn').addEventListener('click', startTest);
    document.getElementById('toTopBtn').addEventListener('click', () => showScreen('intro'));
  </script>
</body>
</html>
